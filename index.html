<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay Elite Residency — 360° View</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080808;overflow:hidden;font-family:'Georgia',serif}
  #app{width:100vw;height:100vh;position:relative;cursor:grab}
  #app.dragging{cursor:grabbing}
  canvas{display:block}

  #loading{
    position:absolute;inset:0;background:#080808;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    z-index:20;transition:opacity 1s ease;
  }
  .l-ring{
    width:52px;height:52px;
    border:1.5px solid rgba(201,169,110,0.15);
    border-top-color:#c9a96e;border-radius:50%;
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .l-name{font-size:18px;letter-spacing:3px;color:rgba(255,255,255,0.8);font-weight:400}
  .l-sub{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(201,169,110,0.6)}

  #ui{position:absolute;inset:0;pointer-events:none}

  #top{
    position:absolute;top:0;left:0;right:0;
    padding:24px 32px;
    display:flex;justify-content:space-between;align-items:flex-start;
  }
  .brand{display:flex;flex-direction:column;gap:3px}
  .brand-tag{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.35)}
  .brand-name{font-size:20px;letter-spacing:1.5px;color:#fff;font-weight:400}
  .brand-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#c9a96e;margin-top:2px}

  .live-pill{
    display:flex;align-items:center;gap:8px;
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(16px);
    border-radius:24px;padding:7px 18px;
    font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:rgba(255,255,255,0.65);
    pointer-events:all;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;background:#c9a96e;
    animation:glow 2s infinite;
  }
  @keyframes glow{0%,100%{opacity:1;box-shadow:0 0 4px #c9a96e}50%{opacity:0.4;box-shadow:none}}

  #bottom{
    position:absolute;bottom:0;left:0;right:0;
    padding:0 32px 28px;
    display:flex;justify-content:space-between;align-items:flex-end;
  }

  .card{
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(24px);
    border-radius:14px;padding:18px 24px;
  }
  .card-title{font-size:15px;color:#fff;letter-spacing:0.5px;margin-bottom:3px}
  .card-sub{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.4)}
  .divider{height:1px;background:rgba(255,255,255,0.07);margin:14px 0}
  .stats{display:flex;gap:24px}
  .sv{font-size:15px;color:#c9a96e;font-weight:400}
  .sl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:3px}

  .btns{
    display:flex;flex-direction:column;gap:8px;
    pointer-events:all;
  }
  .btn{
    width:42px;height:42px;border-radius:50%;
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(16px);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:rgba(255,255,255,0.65);
    font-size:16px;transition:all 0.2s;user-select:none;
  }
  .btn:hover{background:rgba(201,169,110,0.18);border-color:rgba(201,169,110,0.35);color:#c9a96e}
  .btn:active{transform:scale(0.93)}

  #hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(16px);
    border-radius:24px;padding:9px 22px;
    font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:rgba(255,255,255,0.45);
    animation:hintFade 5s ease forwards;pointer-events:none;
  }
  @keyframes hintFade{
    0%{opacity:0;transform:translate(-50%,-50%) translateY(10px)}
    15%{opacity:1;transform:translate(-50%,-50%) translateY(0)}
    75%{opacity:1}
    100%{opacity:0}
  }
</style>
</head>
<body>
<div id="loading">
  <div class="l-ring"></div>
  <div class="l-name">Vijay Elite Residency</div>
  <div class="l-sub">Loading 360° Experience</div>
</div>

<div id="app">
  <div id="ui">
    <div id="top">
      <div class="brand">
        <span class="brand-tag">Virtual Tour</span>
        <span class="brand-name">Vijay Elite Residency</span>
        <span class="brand-sub">Luxury Living · Reimagined</span>
      </div>
      <div class="live-pill"><div class="live-dot"></div>360° Live View</div>
    </div>
    <div id="bottom">
      <div class="card">
        <div class="card-title">Grand Living Suite</div>
        <div class="card-sub">Premium 3BHK · Signature Floor</div>
        <div class="divider"></div>
        <div class="stats">
          <div><div class="sv">2,850</div><div class="sl">Sq. Ft.</div></div>
          <div><div class="sv">12F</div><div class="sl">Floor</div></div>
          <div><div class="sv">360°</div><div class="sl">View</div></div>
        </div>
      </div>
      <div class="btns">
        <div class="btn" id="zin">+</div>
        <div class="btn" id="zout">−</div>
        <div class="btn" id="fs" title="Fullscreen">⛶</div>
      </div>
    </div>
    <div id="hint">Drag to explore · Scroll to zoom</div>
  </div>
</div>

const app = document.getElementById('app');
const loading = document.getElementById('loading');

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
app.insertBefore(renderer.domElement, app.firstChild);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,0,0.01);

const geo = new THREE.SphereGeometry(500, 128, 64);
geo.scale(-1,1,1);

const loader = new THREE.TextureLoader();
loader.load(IMG_SRC, tex => {
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = false;
  const mat = new THREE.MeshBasicMaterial({map:tex});
  const sphere = new THREE.Mesh(geo, mat);
  scene.add(sphere);

  loading.style.opacity = '0';
  setTimeout(()=>loading.style.display='none', 1000);
  animate();
});

let lon = 0, lat = 0;
let tLon = 0, tLat = 0;
let fov = 75;
let dragging = false;
let lastX = 0, lastY = 0;
let velX = 0, velY = 0;

function animate() {
  requestAnimationFrame(animate);

  if (!dragging) {
    velX *= 0.88;
    velY *= 0.88;
    tLon += velX;
    tLat += velY;
  }

  lon += (tLon - lon) * 0.18;
  lat += (tLat - lat) * 0.18;
  lat = Math.max(-85, Math.min(85, lat));

  camera.fov += (fov - camera.fov) * 0.12;
  camera.updateProjectionMatrix();

  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);
  camera.lookAt(
    Math.sin(phi)*Math.cos(theta),
    Math.cos(phi),
    Math.sin(phi)*Math.sin(theta)
  );
  renderer.render(scene, camera);
}

app.addEventListener('mousedown', e=>{
  dragging=true; lastX=e.clientX; lastY=e.clientY;
  velX=0; velY=0;
  app.classList.add('dragging');
});
window.addEventListener('mouseup', ()=>{ dragging=false; app.classList.remove('dragging'); });
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  const dx = e.clientX-lastX;
  const dy = e.clientY-lastY;
  velX = -dx * 0.22;
  velY = -dy * 0.12;
  tLon -= dx * 0.22;
  tLat -= dy * 0.12;
  lastX=e.clientX; lastY=e.clientY;
});

app.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    velX=0; velY=0;
  }
},{passive:true});
window.addEventListener('touchend', ()=>{ dragging=false; });
window.addEventListener('touchmove', e=>{
  if(!dragging||e.touches.length!==1) return;
  const dx=e.touches[0].clientX-lastX;
  const dy=e.touches[0].clientY-lastY;
  velX=-dx*0.22; velY=-dy*0.12;
  tLon-=dx*0.22; tLat-=dy*0.12;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
},{passive:true});

app.addEventListener('wheel', e=>{
  e.preventDefault();
  fov = Math.max(30, Math.min(110, fov + e.deltaY*0.05));
},{passive:false});

document.getElementById('zin').addEventListener('click',()=>{ fov=Math.max(30,fov-10); });
document.getElementById('zout').addEventListener('click',()=>{ fov=Math.min(110,fov+10); });
document.getElementById('fs').addEventListener('click',()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
});

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

setTimeout(()=>{
  const h=document.getElementById('hint');
  if(h) h.remove();
},5500);
</script>
